<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your Mars Exodus account. Access your bookings, dashboard, and mission status.">
  <title>Sign In — Mars Exodus</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="stars-bg" aria-hidden="true"></div>
  <div id="nav-slot"></div>

  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <div class="logo-text">MARS <span>EXODUS</span></div>
          <p>Welcome back, explorer</p>
        </div>
        <form class="auth-form" id="login-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="login-email">Email Address</label>
            <input type="email" class="form-input" id="login-email" placeholder="jane@example.com" autocomplete="email" required>
            <div class="form-error" id="login-email-error">Please enter a valid email</div>
          </div>

          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <input type="password" class="form-input" id="login-password" placeholder="Enter your password" autocomplete="current-password" required>
            <div class="form-error" id="login-password-error">Password is required</div>
          </div>

          <div class="auth-checkbox">
            <input type="checkbox" id="remember-me">
            <label for="remember-me">Remember me for 30 days</label>
          </div>

          <button type="submit" class="btn btn-primary btn-lg auth-submit" id="login-btn">Sign In</button>
        </form>

        <div class="auth-footer">
          Don't have an account? <a href="signup.html">Create one</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/global.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
